name: Feature Request
description: Suggest a new card, mechanic, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature, card idea, or change.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why?
      description: What problem does this solve or what gameplay does it enable?
    validations:
      required: false
