name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version_number' thunderstore/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Check if release already exists
        id: check
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: dotnet build src/SWIP.csproj -c Release

      - name: Package for Thunderstore
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p package
          cp src/bin/Release/netstandard2.1/SWIP.dll package/
          cp thunderstore/manifest.json package/
          cp thunderstore/README.md package/
          cp thunderstore/icon.png package/
          if [ -f thunderstore/CHANGELOG.md ]; then
            cp thunderstore/CHANGELOG.md package/
          fi
          cd package
          zip -r "../SWIP-${VERSION}.zip" .
          cd ..
          rm -rf package

      - name: Extract changelog for this version
        if: steps.check.outputs.skip == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" thunderstore/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create tag and GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          files: SWIP-${{ steps.version.outputs.version }}.zip
          generate_release_notes: false
