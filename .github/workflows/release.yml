name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version_number' thunderstore/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Verify DLL exists
        run: |
          if [ ! -f thunderstore/SWIP.dll ]; then
            echo "ERROR: thunderstore/SWIP.dll not found. Run ./scripts/release.sh locally first."
            exit 1
          fi

      - name: Package for Thunderstore
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p package
          cp thunderstore/SWIP.dll package/
          cp thunderstore/manifest.json package/
          cp thunderstore/README.md package/
          cp thunderstore/icon.png package/
          if [ -f thunderstore/CHANGELOG.md ]; then
            cp thunderstore/CHANGELOG.md package/
          fi
          cd package
          zip -r "../SWIP-${VERSION}.zip" .

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" thunderstore/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          files: SWIP-${{ steps.version.outputs.version }}.zip
          generate_release_notes: false

      - name: Publish to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: rounds
          namespace: BasicallyCoding
          name: SWIP
          version: ${{ steps.version.outputs.version }}
          description: "Sam's Wonderful Impressive Card Park - A custom card pack for ROUNDS"
          website: https://github.com/SLO42/swip
          repo: https://thunderstore.io
          categories: |
            custom-cards
          deps: |
            BepInEx-BepInExPack_ROUNDS-5.4.1901
            willis81808-UnboundLib-3.2.14
            Pykess-ModdingUtils-0.4.8
            Root-RarityLib-1.3.0
            Root-Classes_Manager_Reborn-1.5.5
          path: thunderstore/
